<!doctype html>
<html :lang="$store.locale.current" x-data="localization">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title x-text="t(projectsData.titleHead)"></title>
    <meta name="description" x-bind:content="t(projectsData.descriptionHead)" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body data-page="projects">
    <load src="./src/partials/header.html" />

    <main>
      <h1 x-text="t(projectsData.title)" class="title1"></h1>
      <section id="filter">
        <div class="container"></div>
      </section>
      <section
        id="projects"
        x-data="loadProjects"
        x-init="$watch('$store.locale.current', () => init())"
      >
        <div class="container">
          <ul class="projects-gallery">
            <template x-for="item in projects" :key="item._id">
              <li class="gallery-item">
                <article class="card">
                  <a :href="`/projects/${item.slug}`" class="link-project"> </a>
                  <img :src="item.cover" :alt="item.projectName" class="img" />
                  <div class="hoverInfo">
                    <img src="/public/images/logo.webp" class="logo-info" />
                    <div class="info">
                      <h2 x-text="item.projectName"></h2>
                      <h3 x-text="item.category?.name"></h3>
                      <div class="wrap-info">
                        <a
                          class="city-name"
                          :href="`/city/${item.city?.slug}`"
                          x-text="item.city?.name"
                        ></a>
                        <p
                          x-text="item.timeline? (item.timeline.yearStart && item.timeline.yearEnd ? (item.timeline.yearStart + '-'+ item.timeline.yearEnd) :  (item.timeline.yearStart ?? item.timeline.yearEnd)) : ''"
                        ></p>
                      </div>
                      <p x-text="item.area + ' м2'"></p>
                    </div>
                  </div>
                </article>
              </li>
            </template>
          </ul>
        </div>
        <div x-intersect="hasMore && load()" class="loader">
          <span x-show="isLoading && hasMore">...Loading. Please wait</span>
        </div>
      </section>
    </main>
    <load src="./src/partials/footer.html" />
    <load src="./src/partials/menu.html" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
