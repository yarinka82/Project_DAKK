<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our News</title>
  </head>
  <body data-page="news">
    <load src="./src/partials/header.html" />
    <main>
      <section x-data class="section-news">
        <div
          x-show="!$store.news.isItemOpened"
          :class="{ 'bgc-dark':$store.news.isItemOpened}"
        >
          <load src="./src/partials/news.html" />
        </div>
        <div
          x-show="$store.news.isItemOpened"
          :class="{ 'bgc-dark':$store.news.isItemOpened}"
        >
          <load src="./src/partials/news-single.html" />
        </div>
        <div
          class="news-more-part"
          x-show="$store.news.isItemOpened"
          :class="{ 'bgc-dark':$store.news.isItemOpened}"
        >
          <load src="./src/partials/news-more.html" />
        </div>
      </section>
    </main>
    <load src="./src/partials/footer.html" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
