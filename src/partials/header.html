    <button type="button" @click="openMenu()" aria-label="Відкрити меню">
      Menu
    </button>

    <template x-teleport="body">
      <div
        class="full-screen-menu"
        :class="{ 'is-open': open }"
        @keydown.escape.window="closeMenu()"
      >
        <button
          type="button"
          class="close-button"
          @click="closeMenu()"
          aria-label="Закрити меню"
        >
          &times;
        </button>

        <nav class="menu-nav">
          <ul>
            <template x-for="page in pages" :key="page.link">
              <li>
                <a
                  :href="page.link"
                  @click="closeMenu()"
                  x-text="page.name"
                ></a>
              </li>
            </template>
          </ul>
        </nav>
      </div>
    </template>
  </div>
</header>
