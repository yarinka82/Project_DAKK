<button
  class="btnUp"
  x-data="{show: false}"
  x-init="window.addEventListener('scroll', ()=> show=scrollY>800)"
  x-show="show"
  x-transition
  aria-label="button Up"
  title="button Up"
  @click="window.scrollTo({top:0, behavior: 'smooth'})"
  x-cloak
>
  <svg class="icon-btnUp">
    <use href="/images/sprite.svg#select-up"></use>
  </svg>
</button>
