<!doctype html>
<html lang="uk" :lang="$store.locale.current" x-data="localization">
  <head x-data="pageCategoryProject()">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.sanity.io" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@500;600;700&display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link rel="preload" href="/src/css/components/projects.css" as="style" />
    <link rel="stylesheet" href="/src/css/components/projects.css" />

    <title>
      Галерея проектів Дніпровської архітектурної конструкторської
      компанії(ДАКК) Сторінка категорії
    </title>
    <meta
      name="description"
      content="Ознайомтесь із галереєю проектів ДАКК. Від концептуальних ідей до реалізованих будівель — сучасна архітектура з увагою до деталей. Відкрийте галерею ДАКК і ви знайдете проекти різного спрямування. На даній сторінці представлено проекти в одній із категорій"
    />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body data-page="projects-category" x-data="pageCategoryProject()">
    <template x-if="!is404">
      <fragment>
        <load src="/src/partials/header.html" />
        <main x-data="loadProjects" x-init="init()">
          <section
            id="filter"
            x-data="$store.filters"
            x-init="$watch('$store.locale.current', () => init())"
            x-cloak
          >
            <load src="/src/partials/filters.html" />
          </section>
          <section id="projects">
            <load src="/src/partials/projects.html" />
          </section>
          <template x-if="!$store.projects.isLoading && projects.length>0">
            <load src="/src/partials/leaflet.html" />
          </template>
        </main>
        <load src="/src/partials/footer.html" />
      </fragment>
    </template>
    <template x-if="is404">
      <load src="/src/partials/404.html" />
    </template>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
