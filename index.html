<!doctype html>
<html :lang="$store.locale.current" x-data="localization">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <title x-text="t(indexData.titleHead)"></title>
    <meta name="description" :content="t(indexData.descriptionHead)" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body data-page="home">
    <load src="./src/partials/header.html" />
    <main>
      <section>
        <div class="video-background">
          <video autoplay muted loop playsinline>
            <source src="/videos/bg-video.mp4" type="video/mp4" />
          </video>
          <div class="video-overlay"></div>
          <div
            class="content"
            x-data="{ phrases: ['Проектуємо простір', 'Створюємо майбутнє', 'Архітектура нового покоління'], current: 0, show: true }"
            x-init="setInterval(() => { show = false; setTimeout(() => { current = (current + 1) % phrases.length; show = true; }, 500) }, 3000)"
          >
            <p
              class="phrase-item"
              x-text="phrases[current]"
              x-show="show"
              x-transition.opacity.duration.500ms
            ></p>
          </div>
        </div>
      </section>
    </main>
    <load src="./src/partials/footer.html" />
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
